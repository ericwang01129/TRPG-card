<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>可帶系統 / 劇本｜睿諳 Eric</title>
<meta name="description" content="睿諳 Eric 目前可帶的 TRPG 系統與劇本列表，支援系統與 R-18 題材篩選。" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="page-scenarios">

<div class="bg-layer" aria-hidden="true"></div>
<div class="bg-veil" aria-hidden="true"></div>

<header class="nav">
  <a class="nav__brand" href="index.html">
    <span class="nav__chibi" aria-hidden="true">
      <img src="gm_portrait.png" alt="" />
    </span>
    <span class="nav__brand-text">
      <span class="nav__mark">睿諳 · Eric</span>
      <span class="nav__sub">TRPG 名片</span>
    </span>
  </a>
  <button class="nav__toggle" type="button" aria-label="開啟選單" aria-expanded="false" aria-controls="primary-nav">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav__links" id="primary-nav">
    <a href="index.html#about">關於</a>
    <a href="index.html#style">帶團風格</a>
    <a href="index.html#custom">設定原則</a>
    <a href="scenarios.html" class="is-current">可帶系統</a>
    <a href="index.html#contact">連結</a>
  </nav>
</header>

<main>

  <section class="section section--first" id="run">
    <div class="section__head">
      <span class="section__index">　</span>
      <h2 class="section__title">目前可帶系統 / 劇本</h2>
      <p class="section__sub">Currently Available Scenarios</p>
    </div>

    <div class="filter" id="scenario-filter">
      <div class="filter__row">
        <span class="filter__label">系統篩選</span>
        <div class="filter__chips">
          <label class="chip"><input type="checkbox" value="DND 5e" checked /><span>DND 5e</span></label>
          <label class="chip"><input type="checkbox" value="PbtA" checked /><span>PbtA</span></label>
          <label class="chip"><input type="checkbox" value="BRP" checked /><span>BRP</span></label>
          <label class="chip"><input type="checkbox" value="COJ" checked /><span>COJ</span></label>
          <label class="chip"><input type="checkbox" value="其他" checked /><span>其他</span></label>
        </div>
        <button type="button" class="filter__clear" id="filter-clear">全選</button>
      </div>
      <div class="filter__row filter__row--r18">
        <label class="toggle">
          <input type="checkbox" id="filter-r18" />
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
          <span class="toggle__label">顯示 R-18 / 敏感題材</span>
        </label>
        <span class="filter__count" id="filter-count"></span>
      </div>
    </div>

    <div class="run-list" id="run-list" data-src="scenarios.json">
      <p class="run-state" id="run-state">讀取中…</p>
    </div>
    <p class="run-empty" id="run-empty">目前條件下沒有符合的系統 / 劇本。</p>

  </section>

</main>

<footer class="footer">
  <div class="footer__inner">
    <p class="footer__left">© 睿諳 Eric · TRPG GM Card</p>
    <p class="footer__credit">
      背景圖 ©
      <a href="https://clibo.tw/users/G0fmVv" target="_blank" rel="noopener">夜樹</a>
    </p>
    <p class="footer__right">Roll for initiative.</p>
  </div>
</footer>

<script src="script.js" defer></script>
</body>
</html>
